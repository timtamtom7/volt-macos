name: Volt
options:
  bundleIdPrefix: com.volt
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  Volt:
    type: application
    platform: macOS
    sources:
      - path: Volt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.volt.app
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Volt.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
    dependencies:
      - package: SQLite
        product: SQLite
    entitlements:
      path: Volt.entitlements
